<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HYROX Builder Carousel Gallery</title>
  <style>
    :root { color-scheme: dark; --ink:#0b0b0b; --paper:#f4f0e6; --yellow:#f5df18; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--ink);
      color: var(--paper);
      font-family: "Noto Sans TC", "Noto Sans CJK TC", system-ui, sans-serif;
    }
    main { width: min(1180px, calc(100% - 40px)); margin: 0 auto; padding: 72px 0; }
    h1 { margin: 0; color: var(--yellow); font-size: clamp(2.5rem, 7vw, 5.5rem); line-height: .95; }
    p { margin: 24px 0 48px; font-size: 1.15rem; }
    .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    img { width: 100%; height: auto; border: 3px solid var(--yellow); background: var(--paper); }
    @media (max-width: 820px) { .gallery { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main>
    <h1>CAROUSEL<br>GALLERY</h1>
    <p>Deterministic 1080 × 1350 PNG output generated with HTML, CSS and Playwright.</p>
    <section class="gallery" aria-label="Example carousel">
      <img src="generated/first-hyrox-five-things/01.png" alt="第一次玩 HYROX carousel cover">
      <img src="generated/first-hyrox-five-things/02.png" alt="ROXZONE 都會食時間">
      <img src="generated/first-hyrox-five-things/03.png" alt="Save 低賽前再睇">
    </section>
  </main>
</body>
</html>
