name: Render carousel images

on:
  push:
    branches:
      - main
    paths:
      - "posts/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/render.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: render-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Traditional Chinese font
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Render PNG files
        run: npm run render

      - name: Commit generated PNG files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/generated
          if git diff --cached --quiet; then
            echo "No generated image changes"
            exit 0
          fi
          git commit -m "Render carousel images"
          git pull --rebase origin main
          git push origin HEAD:main
